name: Build and Push

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version
      id: version
      run: |
        LATEST_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n1)
        if [[ -z "$LATEST_TAG" ]]; then
          VERSION="v1.0.0"
        else
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
          PATCH=$((PATCH + 1))
          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_plain=${VERSION#v}" >> $GITHUB_OUTPUT

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/team-redbull/segments-manager:${{ steps.version.outputs.version }}

    - name: Update Helm chart image tag
      run: |
        sed -i "s|^  repository:.*|  repository: ghcr.io/team-redbull/segments-manager|" deploy/helm/values.yaml
        sed -i "s|^  tag:.*|  tag: ${{ steps.version.outputs.version }}|" deploy/helm/values.yaml

    - name: Commit and tag version
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add deploy/helm/values.yaml
        git commit -m "chore: bump image tag to ${{ steps.version.outputs.version }}"
        git tag ${{ steps.version.outputs.version }}
        git push origin main ${{ steps.version.outputs.version }}
