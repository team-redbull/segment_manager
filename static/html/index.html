<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segments Manager</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1 style="margin: 0;">🌐 VLAN Segment Manager</h1>
        </div>

        <div id="errorBanner" class="error-banner"></div>
        <div id="successBanner" class="success-banner"></div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>Loading...</h3>
            </div>
        </div>
        
        <div class="card full-width">
            <div class="segments-header">
                <h2>Segments</h2>
                <div class="export-buttons">
                    <button class="btn btn-secondary" onclick="exportData('csv')">📊 Export CSV</button>
                    <button class="btn btn-secondary" onclick="exportData('excel')">📋 Export Excel</button>
                    <button class="btn btn-secondary" onclick="exportStats('csv')">📈 Export Stats</button>
                </div>
            </div>
            <div class="filters">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search by cluster name, EPG, VLAN ID, or segment..." class="search-input">
                    <button id="clearSearch" class="clear-search" title="Clear search">✕</button>
                </div>
                <div class="status-tabs">
                    <div class="tab active" data-filter="all">All</div>
                    <div class="tab" data-filter="available">Available</div>
                    <div class="tab" data-filter="allocated">Allocated</div>
                </div>
                <div class="site-filter">
                    <label for="siteFilter">Filter by Site:</label>
                    <select id="siteFilter">
                        <option value="">All Sites</option>
                    </select>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Site</th>
                            <th>VLAN ID</th>
                            <th>EPG Name</th>
                            <th>Network Segment</th>
                            <th>DHCP</th>
                            <th>Cluster</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="segmentsList">
                        <tr>
                            <td colspan="7" class="empty-state">Loading segments...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Help Button - Bottom Center -->
        <div style="text-align: center; margin: 40px 0 20px 0;">
            <a href="/static/html/help.html" style="background: var(--primary-color); color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: 500; display: inline-block; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">📚 Help & Documentation</a>
        </div>
    </div>
    
    <div class="connection-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connected</span>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
